<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#030305"><title>Shiri Management Portal</title><style>
:root{--black:#030305;--pink:#d80882;--cyan:#209bce;--yellow:#f7eb0d;--bg:#f3f4f7;--card:#fff;--text:#15151a;--muted:#666b75;--line:#e0e3e9;--bad:#b42318;--ok:#087a45}*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input{font:inherit}.hidden{display:none!important}.center{min-height:100vh;display:grid;place-items:center;padding:24px}.card,.panel,.metric{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 38px rgba(3,3,5,.09)}.auth{width:min(510px,100%);padding:30px}.brand{font-size:38px;font-weight:900;letter-spacing:-2px;margin-bottom:4px}.brand b{color:var(--pink)}.brand small{display:block;color:var(--cyan);font-size:14px;letter-spacing:5px}.dots{display:flex;gap:7px;margin:16px 0 22px}.dots i{height:7px;flex:1;border-radius:20px}.field{display:grid;gap:7px;margin:14px 0}.field label{font-weight:700}.field input{padding:13px;border:1px solid var(--line);border-radius:11px}.btn{border:0;border-radius:11px;padding:12px 16px;font-weight:800;cursor:pointer}.primary{background:var(--pink);color:#fff}.dark{background:var(--black);color:#fff}.soft{background:#eceef3;color:var(--black)}.danger{background:#fee4e2;color:var(--bad)}.full{width:100%}.msg{padding:12px;border-radius:10px;margin:12px 0;background:#eef0f5;white-space:pre-wrap}.msg.bad{background:#fee4e2;color:var(--bad)}.msg.good{background:#dcfae6;color:var(--ok)}.app{min-height:100vh;display:grid;grid-template-columns:245px 1fr}.side{background:var(--black);color:#fff;padding:22px 14px;display:flex;flex-direction:column;height:100vh;position:sticky;top:0}.side .brand{font-size:28px;padding:7px 10px 22px;border-bottom:1px solid #2b2b31}.nav{display:grid;gap:5px;margin-top:18px;overflow:auto}.nav button{border:0;background:transparent;color:#c9cbd2;text-align:left;padding:12px;border-radius:10px;font-weight:700}.nav button:hover,.nav button.active{background:#24252c;color:#fff}.nav button.active{box-shadow:inset 4px 0 var(--pink)}.sidefoot{margin-top:auto}.main{min-width:0}.top{height:70px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 23px;position:sticky;top:0;z-index:3}.top h1{font-size:22px}.top span{margin-left:auto;color:var(--muted)}.content{padding:25px}.head{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px}.head h2{margin:0;font-size:30px}.head p{margin:5px 0;color:var(--muted)}.head button{margin-left:auto}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.metric{padding:18px}.metric label{color:var(--muted);font-weight:700}.metric strong{display:block;font-size:29px;margin:8px 0}.metric small{color:var(--muted)}.panel{padding:18px;margin-top:18px}.tools{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px}.tools input{padding:11px;border:1px solid var(--line);border-radius:10px;min-width:230px}.table{overflow:auto;border:1px solid var(--line);border-radius:12px}table{border-collapse:collapse;width:100%;min-width:760px}th,td{padding:11px 12px;text-align:left;border-bottom:1px solid var(--line);max-width:280px;overflow-wrap:anywhere}th{background:#f7f8fa;font-size:12px}.menu{display:none}@media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.app{display:block}.side{position:fixed;width:245px;left:-260px;z-index:10;transition:.2s}.side.open{left:0}.menu{display:inline-block;margin-right:12px}.content{padding:16px}.grid{grid-template-columns:1fr}.top span{display:none}}
</style></head><body><div id="root" class="center"><div class="card auth"><div class="brand"><b>●</b>shiri<small>PHOTOCOPY SHOP</small></div><div class="dots"><i style="background:#d80882"></i><i style="background:#209bce"></i><i style="background:#f7eb0d"></i></div><p>Opening the secure management portal…</p></div></div>
<script type="module">
import{createClient}from'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb=createClient('https://bujocrzkqqijdzmfozis.supabase.co','sb_publishable_4IFGL50vNp3__-pcp19-Ww_XLUQNA-D',{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
const root=document.getElementById('root');const allowed=new Set(['owner','administrator','manager','auditor']);const managers=new Set(['owner','administrator','manager']);let ctx=null,page='Overview';
const esc=v=>String(v??'—').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const money=v=>Number(v||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const brand=()=>'<div class="brand"><b>●</b>shiri<small>PHOTOCOPY SHOP</small></div><div class="dots"><i style="background:#d80882"></i><i style="background:#209bce"></i><i style="background:#f7eb0d"></i></div>';
function auth(message=''){root.className='center';root.innerHTML=`<form id="loginForm" class="card auth">${brand()}<h2 id="authTitle">Sign in</h2><p>Owners, administrators, managers and auditors only.</p><div id="authMessage">${message?`<div class="msg bad">${esc(message)}</div>`:''}</div><div class="field hidden" id="nameField"><label for="fullName">Full name</label><input id="fullName" autocomplete="name"></div><div class="field"><label for="email">Email</label><input id="email" type="email" autocomplete="email" required></div><div class="field"><label for="password">Password</label><input id="password" type="password" minlength="8" autocomplete="current-password" required></div><button id="submitAuth" class="btn primary full" type="submit">Sign in</button><button id="toggleAuth" type="button" class="btn soft full" style="margin-top:9px">Register first owner</button></form>`;
let registering=false;const form=document.getElementById('loginForm'),title=document.getElementById('authTitle'),messageBox=document.getElementById('authMessage'),nameField=document.getElementById('nameField'),fullNameInput=document.getElementById('fullName'),emailInput=document.getElementById('email'),passwordInput=document.getElementById('password'),submitButton=document.getElementById('submitAuth'),toggleButton=document.getElementById('toggleAuth');
toggleButton.addEventListener('click',()=>{registering=!registering;nameField.classList.toggle('hidden',!registering);fullNameInput.required=registering;title.textContent=registering?'Register first owner':'Sign in';submitButton.textContent=registering?'Create owner account':'Sign in';toggleButton.textContent=registering?'Back to sign in':'Register first owner';messageBox.innerHTML=''});
form.addEventListener('submit',async event=>{event.preventDefault();messageBox.innerHTML='<div class="msg">Working…</div>';try{const email=emailInput.value.trim(),password=passwordInput.value,fullName=fullNameInput.value.trim();if(registering&&!fullName)throw new Error('Enter the owner full name.');const result=registering?await sb.auth.signUp({email,password,options:{data:{full_name:fullName},emailRedirectTo:window.location.href.split('#')[0]}}):await sb.auth.signInWithPassword({email,password});if(result.error)throw result.error;if(registering&&!result.data.session)messageBox.innerHTML='<div class="msg good">Account created. Confirm the email, then return here and sign in.</div>';else await boot()}catch(error){messageBox.innerHTML=`<div class="msg bad">${esc(error?.message||error)}</div>`}})}
async function context(){const{data:{user}}=await sb.auth.getUser();if(!user)return null;const p=await sb.from('profiles').select('id,organisation_id,full_name,employee_code,is_active').eq('id',user.id).maybeSingle();if(p.error)throw p.error;if(!p.data)return{user,name:user.user_metadata?.full_name||user.email,roles:[],org:null,active:true};const r=await sb.from('user_roles').select('roles(code)').eq('profile_id',user.id);if(r.error)throw r.error;return{user,name:p.data.full_name||user.email,roles:(r.data||[]).map(x=>x.roles?.code).filter(Boolean),org:p.data.organisation_id,active:p.data.is_active!==false}}
function setup(){root.className='center';root.innerHTML=`<div class="card auth">${brand()}<h2>Set up Shiri Photocopy Shop</h2><p>Create Main Branch, Till 1, roles, payment methods and the default service catalogue.</p><div id="setupMessage"></div><button id="setupGo" class="btn primary">Create Shiri workspace</button> <button id="setupOut" class="btn soft">Sign out</button></div>`;document.getElementById('setupOut').onclick=()=>sb.auth.signOut();document.getElementById('setupGo').onclick=async()=>{const button=document.getElementById('setupGo'),box=document.getElementById('setupMessage');button.disabled=true;try{const r=await sb.rpc('bootstrap_organisation',{p_business_name:'Shiri Photocopy Shop',p_branch_name:'Main Branch',p_branch_code:'MAIN'});if(r.error)throw r.error;if(r.data?.organisation_id){const s=await sb.rpc('seed_default_catalogue',{p_organisation_id:r.data.organisation_id});if(s.error)throw s.error}await boot()}catch(error){box.innerHTML=`<div class="msg bad">${esc(error?.message||error)}</div>`;button.disabled=false}}}
const modules=[['Overview','overview'],['Sales','sales'],['Jobs','jobs'],['Inventory','products'],['Expenses','expenses'],['Accounting','accounting'],['Staff','profiles','manager'],['Audit','audit_events'],['Settings','settings','manager']];
function shell(){const can=ctx.roles.some(r=>managers.has(r));root.className='';root.innerHTML=`<div class="app"><aside id="side" class="side">${brand()}<nav class="nav">${modules.filter(x=>!x[2]||can).map(x=>`<button data-label="${x[0]}" data-key="${x[1]}" class="${page===x[0]?'active':''}">${x[0]}</button>`).join('')}</nav><div class="sidefoot"><small>${esc(ctx.name)}<br>${esc(ctx.roles.join(', '))}</small><button id="logout" class="btn danger full" style="margin-top:12px">Sign out</button></div></aside><main class="main"><header class="top"><button id="menu" class="btn soft menu">☰</button><h1>${esc(page)}</h1><span>${esc(ctx.name)}</span></header><section id="content" class="content"></section></main></div>`;document.querySelectorAll('[data-key]').forEach(button=>button.onclick=()=>open(button.dataset.label,button.dataset.key));document.getElementById('logout').onclick=()=>sb.auth.signOut();document.getElementById('menu').onclick=()=>document.getElementById('side').classList.toggle('open')}
async function open(label,key){page=label;shell();const content=document.getElementById('content');content.innerHTML='<div class="panel">Loading…</div>';try{if(key==='overview')await overview();else if(key==='accounting')await accounting();else if(key==='settings')settings();else await records(label,key)}catch(error){content.innerHTML=`<div class="panel"><div class="msg bad">${esc(error?.message||error)}</div><button id="retry" class="btn soft">Retry</button></div>`;document.getElementById('retry').onclick=()=>open(label,key)}}
const metric=(l,v,c)=>`<article class="metric"><label>${esc(l)}</label><strong>${esc(v)}</strong><small>${esc(c)}</small></article>`;
async function overview(){const content=document.getElementById('content'),d=new Date(),start=new Date(d.getFullYear(),d.getMonth(),d.getDate()).toISOString(),end=new Date(d.getFullYear(),d.getMonth(),d.getDate()+1).toISOString(),[s,e,j,c]=await Promise.all([sb.from('sales').select('total_usd,status').gte('occurred_at',start).lt('occurred_at',end),sb.from('expenses').select('amount_usd').gte('incurred_at',start).lt('incurred_at',end),sb.from('jobs').select('status').limit(1000),sb.from('change_owed').select('outstanding_amount,currency,status').neq('status','settled').limit(1000)]);for(const r of[s,e,j,c])if(r.error)throw r.error;const sales=(s.data||[]).filter(x=>!['voided','refunded'].includes(x.status)).reduce((a,x)=>a+Number(x.total_usd||0),0),expenses=(e.data||[]).reduce((a,x)=>a+Number(x.amount_usd||0),0),openJobs=(j.data||[]).filter(x=>!['collected','cancelled','refunded'].includes(x.status)).length,ready=(j.data||[]).filter(x=>x.status==='ready_for_collection').length,change=(c.data||[]).filter(x=>x.currency==='USD').reduce((a,x)=>a+Number(x.outstanding_amount||0),0);content.innerHTML=`<div class="head"><div><h2>Good day, ${esc(ctx.name)}</h2><p>Live Shiri business overview.</p></div><button id="refresh" class="btn soft">Refresh</button></div><div class="grid">${metric('Sales today','$'+money(sales),'Non-voided sales')}${metric('Expenses today','$'+money(expenses),'Operating expenses')}${metric('Net today','$'+money(sales-expenses),'Sales less expenses')}${metric('Open jobs',openJobs,'Active jobs')}${metric('Ready for collection',ready,'Collection queue')}${metric('Change owed','$'+money(change),'Outstanding USD')}</div><div class="panel"><b>Supabase connected</b><p>All data is protected by authentication and Row-Level Security.</p></div>`;document.getElementById('refresh').onclick=overview}
async function records(label,table){const content=document.getElementById('content'),r=await sb.from(table).select().limit(100);if(r.error)throw r.error;const rows=r.data||[];content.innerHTML=`<div class="head"><div><h2>${esc(label)}</h2><p>Live, read-only Supabase records.</p></div><button id="refresh" class="btn soft">Refresh</button></div><div class="panel"><div class="tools"><input id="search" placeholder="Search records"></div><div id="holder"></div></div>`;const holder=document.getElementById('holder'),search=document.getElementById('search');const draw=q=>{const list=rows.filter(row=>!q||Object.values(row).some(v=>String(v??'').toLowerCase().includes(q.toLowerCase())));if(!list.length){holder.innerHTML='<p>No records found.</p>';return}const cols=[...new Set(list.flatMap(Object.keys))].slice(0,7);holder.innerHTML=`<div class="table"><table><thead><tr>${cols.map(c=>`<th>${esc(c.replaceAll('_',' '))}</th>`).join('')}</tr></thead><tbody>${list.map(row=>`<tr>${cols.map(c=>`<td>${esc(typeof row[c]==='object'?JSON.stringify(row[c]):row[c])}</td>`).join('')}</tr>`).join('')}</tbody></table></div><p>${list.length} record(s)</p>`};draw('');search.oninput=e=>draw(e.target.value);document.getElementById('refresh').onclick=()=>records(label,table)}
async function accounting(period='month'){const content=document.getElementById('content'),n=new Date();let a,b,label;if(period==='today'){a=new Date(n.getFullYear(),n.getMonth(),n.getDate());b=new Date(a);b.setDate(b.getDate()+1);label='Today'}else if(period==='week'){a=new Date(n.getFullYear(),n.getMonth(),n.getDate()-((n.getDay()+6)%7));b=new Date(a);b.setDate(b.getDate()+7);label='This week'}else{a=new Date(n.getFullYear(),n.getMonth(),1);b=new Date(n.getFullYear(),n.getMonth()+1,1);label='This month'}const[s,e]=await Promise.all([sb.from('sales').select('total_usd,status').gte('occurred_at',a.toISOString()).lt('occurred_at',b.toISOString()),sb.from('expenses').select('amount_usd').gte('incurred_at',a.toISOString()).lt('incurred_at',b.toISOString())]);if(s.error)throw s.error;if(e.error)throw e.error;let revenue=0,excluded=0;for(const x of s.data||[]){if(['voided','refunded','cancelled'].includes(x.status))excluded++;else revenue+=Number(x.total_usd||0)}const expense=(e.data||[]).reduce((sum,x)=>sum+Number(x.amount_usd||0),0);content.innerHTML=`<div class="head"><div><h2>Profit and loss</h2><p>${label}</p></div></div><div class="tools"><button class="btn soft" data-period="today">Today</button><button class="btn soft" data-period="week">This week</button><button class="btn soft" data-period="month">This month</button></div><div class="grid">${metric('Revenue','$'+money(revenue),'Recognised sales')}${metric('Expenses','$'+money(expense),'Operating expenses')}${metric('Net result','$'+money(revenue-expense),'Revenue less expenses')}${metric('Excluded sales',excluded,'Voided/refunded')}</div>`;document.querySelectorAll('[data-period]').forEach(button=>button.onclick=()=>accounting(button.dataset.period))}
function settings(){document.getElementById('content').innerHTML=`<div class="head"><div><h2>Settings</h2><p>Current secure session.</p></div></div><div class="panel"><p><b>User:</b> ${esc(ctx.name)}</p><p><b>Roles:</b> ${esc(ctx.roles.join(', '))}</p><p><b>Organisation:</b> ${esc(ctx.org)}</p><p><b>Project:</b> bujocrzkqqijdzmfozis</p></div>`}
async function boot(){try{const{data:{session}}=await sb.auth.getSession();if(!session){ctx=null;auth();return}ctx=await context();if(!ctx){auth();return}if(!ctx.active){auth('This staff account is suspended.');return}if(!ctx.org||!ctx.roles.length){setup();return}if(!ctx.roles.some(r=>allowed.has(r))){auth('This account does not have management portal access.');return}page='Overview';shell();await overview()}catch(error){auth(error?.message||String(error))}}
sb.auth.onAuthStateChange(()=>setTimeout(boot,0));boot();
</script></body></html>
