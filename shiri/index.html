<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#030305">
<title>Shiri Management Portal</title>
<style>
:root{--black:#030305;--pink:#d80882;--cyan:#209bce;--yellow:#f7eb0d;--bg:#f3f4f7;--card:#fff;--text:#15151a;--muted:#666b75;--line:#e0e3e9;--danger:#b42318;--ok:#087a45}*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input{font:inherit}.hidden{display:none!important}.center{min-height:100vh;display:grid;place-items:center;padding:24px}.card,.panel,.metric{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 38px rgba(3,3,5,.09)}.auth{width:min(500px,100%);padding:30px}.brand{font-size:38px;font-weight:900;letter-spacing:-2px;margin-bottom:4px}.brand b{color:var(--pink)}.brand small{display:block;color:var(--cyan);font-size:14px;letter-spacing:5px}.dots{display:flex;gap:7px;margin:16px 0 22px}.dots i{height:7px;flex:1;border-radius:20px}.field{display:grid;gap:7px;margin:14px 0}.field label{font-weight:700}.field input{padding:13px;border:1px solid var(--line);border-radius:11px}.btn{border:0;border-radius:11px;padding:12px 16px;font-weight:800;cursor:pointer}.primary{background:var(--pink);color:#fff}.dark{background:var(--black);color:#fff}.soft{background:#eceef3;color:var(--black)}.danger{background:#fee4e2;color:var(--danger)}.full{width:100%}.msg{padding:12px;border-radius:10px;margin:12px 0;background:#eef0f5;white-space:pre-wrap}.msg.bad{background:#fee4e2;color:var(--danger)}.msg.good{background:#dcfae6;color:var(--ok)}.app{min-height:100vh;display:grid;grid-template-columns:245px 1fr}.side{background:var(--black);color:#fff;padding:22px 14px;display:flex;flex-direction:column;height:100vh;position:sticky;top:0}.side .brand{font-size:28px;padding:7px 10px 22px;border-bottom:1px solid #2b2b31}.nav{display:grid;gap:5px;margin-top:18px;overflow:auto}.nav button{border:0;background:transparent;color:#c9cbd2;text-align:left;padding:12px;border-radius:10px;font-weight:700}.nav button:hover,.nav button.active{background:#24252c;color:#fff}.nav button.active{box-shadow:inset 4px 0 var(--pink)}.sidefoot{margin-top:auto}.main{min-width:0}.top{height:70px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 23px;position:sticky;top:0;z-index:3}.top h1{font-size:22px}.top span{margin-left:auto;color:var(--muted)}.content{padding:25px}.head{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px}.head h2{margin:0;font-size:30px}.head p{margin:5px 0;color:var(--muted)}.head button{margin-left:auto}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.metric{padding:18px}.metric label{color:var(--muted);font-weight:700}.metric strong{display:block;font-size:29px;margin:8px 0}.metric small{color:var(--muted)}.panel{padding:18px;margin-top:18px}.tools{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px}.tools input{padding:11px;border:1px solid var(--line);border-radius:10px;min-width:230px}.table{overflow:auto;border:1px solid var(--line);border-radius:12px}table{border-collapse:collapse;width:100%;min-width:760px}th,td{padding:11px 12px;text-align:left;border-bottom:1px solid var(--line);max-width:280px;overflow-wrap:anywhere}th{background:#f7f8fa;font-size:12px}.menu{display:none}@media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.app{display:block}.side{position:fixed;width:245px;left:-260px;z-index:10;transition:.2s}.side.open{left:0}.menu{display:inline-block;margin-right:12px}.content{padding:16px}.grid{grid-template-columns:1fr}.top span{display:none}}
</style>
</head>
<body><div id="root" class="center"><div class="card auth"><div class="brand"><b>●</b>shiri<small>PHOTOCOPY SHOP</small></div><div class="dots"><i style="background:#d80882"></i><i style="background:#209bce"></i><i style="background:#f7eb0d"></i></div><p>Opening the secure management portal…</p></div></div>
<script type="module">
import{createClient}from'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb=createClient('https://bujocrzkqqijdzmfozis.supabase.co','sb_publishable_4IFGL50vNp3__-pcp19-Ww_XLUQNA-D',{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}}),root=document.querySelector('#root');
const esc=v=>String(v??'—').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),money=v=>Number(v||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}),rolesAllowed=new Set(['owner','administrator','manager','auditor']),managerRoles=new Set(['owner','administrator','manager']);let ctx,page='Overview';
function brand(){return'<div class="brand"><b>●</b>shiri<small>PHOTOCOPY SHOP</small></div><div class="dots"><i style="background:#d80882"></i><i style="background:#209bce"></i><i style="background:#f7eb0d"></i></div>'}
function auth(message=''){root.className='center';root.innerHTML=`<form id="login" class="card auth">${brand()}<h2 id="at">Sign in</h2><p>Owners, administrators, managers and auditors only.</p><div id="m">${message?`<div class="msg bad">${esc(message)}</div>`:''}</div><div class="field hidden" id="nf"><label>Full name</label><input id="name"></div><div class="field"><label>Email</label><input id="email" type="email" required></div><div class="field"><label>Password</label><input id="pass" type="password" minlength="8" required></div><button id="submit" class="btn primary full">Sign in</button><button id="toggle" type="button" class="btn soft full" style="margin-top:9px">Register first owner</button></form>`;let reg=false;toggle.onclick=()=>{reg=!reg;nf.classList.toggle('hidden',!reg);at.textContent=reg?'Register first owner':'Sign in';submit.textContent=reg?'Create owner account':'Sign in';toggle.textContent=reg?'Back to sign in':'Register first owner'};login.onsubmit=async e=>{e.preventDefault();m.innerHTML='<div class="msg">Working…</div>';try{const email=document.querySelector('#email').value.trim(),password=pass.value,full_name=name.value.trim();const r=reg?await sb.auth.signUp({email,password,options:{data:{full_name},emailRedirectTo:location.href.split('#')[0]}}):await sb.auth.signInWithPassword({email,password});if(r.error)throw r.error;if(reg&&!r.data.session)m.innerHTML='<div class="msg good">Account created. Confirm the email, then return here.</div>';else boot()}catch(x){m.innerHTML=`<div class="msg bad">${esc(x.message||x)}</div>`}}}
async function context(){const{data:{user}}=await sb.auth.getUser();if(!user)return null;const p=await sb.from('profiles').select('id,organisation_id,full_name,employee_code,is_active').eq('id',user.id).maybeSingle();if(p.error)throw p.error;if(!p.data)return{user,name:user.user_metadata?.full_name||user.email,roles:[],org:null,active:true};const r=await sb.from('user_roles').select('roles(code)').eq('profile_id',user.id);if(r.error)throw r.error;return{user,name:p.data.full_name||user.email,roles:(r.data||[]).map(x=>x.roles?.code).filter(Boolean),org:p.data.organisation_id,active:p.data.is_active!==false}}
function setup(){root.className='center';root.innerHTML=`<div class="card auth">${brand()}<h2>Set up Shiri Photocopy Shop</h2><p>Create Main Branch, Till 1, roles, payment methods and the default service catalogue.</p><div id="m"></div><button id="go" class="btn primary">Create Shiri workspace</button> <button id="out" class="btn soft">Sign out</button></div>`;out.onclick=()=>sb.auth.signOut();go.onclick=async()=>{go.disabled=true;try{const r=await sb.rpc('bootstrap_organisation',{p_business_name:'Shiri Photocopy Shop',p_branch_name:'Main Branch',p_branch_code:'MAIN'});if(r.error)throw r.error;if(r.data?.organisation_id){const s=await sb.rpc('seed_default_catalogue',{p_organisation_id:r.data.organisation_id});if(s.error)throw s.error}boot()}catch(x){m.innerHTML=`<div class="msg bad">${esc(x.message||x)}</div>`;go.disabled=false}}}
const modules=[['Overview','overview'],['Sales','sales'],['Jobs','jobs'],['Inventory','products'],['Expenses','expenses'],['Accounting','accounting'],['Staff','profiles','manager'],['Audit','audit_events'],['Settings','settings','manager']];
function shell(){const can=ctx.roles.some(r=>managerRoles.has(r));root.className='';root.innerHTML=`<div class="app"><aside id="side" class="side">${brand()}<nav class="nav">${modules.filter(x=>!x[2]||can).map(x=>`<button data-key="${x[1]}" class="${page===x[0]?'active':''}">${x[0]}</button>`).join('')}</nav><div class="sidefoot"><small>${esc(ctx.name)}<br>${esc(ctx.roles.join(', '))}</small><button id="logout" class="btn danger full" style="margin-top:12px">Sign out</button></div></aside><main class="main"><header class="top"><button id="menu" class="btn soft menu">☰</button><h1>${esc(page)}</h1><span>${esc(ctx.name)}</span></header><section id="content" class="content"></section></main></div>`;document.querySelectorAll('[data-key]').forEach(b=>b.onclick=()=>open(b.textContent,b.dataset.key));logout.onclick=()=>sb.auth.signOut();menu.onclick=()=>side.classList.toggle('open')}
async function open(label,key){page=label;shell();content.innerHTML='<div class="panel">Loading…</div>';try{if(key==='overview')await overview();else if(key==='accounting')await accounting();else if(key==='settings')settings();else await records(label,key)}catch(x){content.innerHTML=`<div class="panel"><div class="msg bad">${esc(x.message||x)}</div><button id="retry" class="btn soft">Retry</button></div>`;retry.onclick=()=>open(label,key)}}
const metric=(l,v,c)=>`<article class="metric"><label>${esc(l)}</label><strong>${esc(v)}</strong><small>${esc(c)}</small></article>`;
async function overview(){const d=new Date(),start=new Date(d.getFullYear(),d.getMonth(),d.getDate()).toISOString(),end=new Date(d.getFullYear(),d.getMonth(),d.getDate()+1).toISOString(),[s,e,j,c]=await Promise.all([sb.from('sales').select('total_usd,status').gte('occurred_at',start).lt('occurred_at',end),sb.from('expenses').select('amount_usd').gte('incurred_at',start).lt('incurred_at',end),sb.from('jobs').select('status').limit(1000),sb.from('change_owed').select('outstanding_amount,currency,status').neq('status','settled').limit(1000)]);for(const r of[s,e,j,c])if(r.error)throw r.error;const sales=(s.data||[]).filter(x=>!['voided','refunded'].includes(x.status)).reduce((a,x)=>a+Number(x.total_usd||0),0),expenses=(e.data||[]).reduce((a,x)=>a+Number(x.amount_usd||0),0),open=(j.data||[]).filter(x=>!['collected','cancelled','refunded'].includes(x.status)).length,ready=(j.data||[]).filter(x=>x.status==='ready_for_collection').length,change=(c.data||[]).filter(x=>x.currency==='USD').reduce((a,x)=>a+Number(x.outstanding_amount||0),0);content.innerHTML=`<div class="head"><div><h2>Good day, ${esc(ctx.name)}</h2><p>Live Shiri business overview.</p></div><button id="refresh" class="btn soft">Refresh</button></div><div class="grid">${metric('Sales today','$'+money(sales),'Non-voided sales')}${metric('Expenses today','$'+money(expenses),'Operating expenses')}${metric('Net today','$'+money(sales-expenses),'Sales less expenses')}${metric('Open jobs',open,'Active jobs')}${metric('Ready for collection',ready,'Collection queue')}${metric('Change owed','$'+money(change),'Outstanding USD')}</div><div class="panel"><b>Supabase connected</b><p>All data is protected by authentication and Row-Level Security.</p></div>`;refresh.onclick=overview}
async function records(label,table){const r=await sb.from(table).select().limit(100);if(r.error)throw r.error;let rows=r.data||[];content.innerHTML=`<div class="head"><div><h2>${esc(label)}</h2><p>Live, read-only Supabase records.</p></div><button id="refresh" class="btn soft">Refresh</button></div><div class="panel"><div class="tools"><input id="search" placeholder="Search records"></div><div id="holder"></div></div>`;const draw=q=>{const list=rows.filter(row=>!q||Object.values(row).some(v=>String(v??'').toLowerCase().includes(q.toLowerCase())));if(!list.length){holder.innerHTML='<p>No records found.</p>';return}const cols=[...new Set(list.flatMap(Object.keys))].slice(0,7);holder.innerHTML=`<div class="table"><table><thead><tr>${cols.map(c=>`<th>${esc(c.replaceAll('_',' '))}</th>`).join('')}</tr></thead><tbody>${list.map(row=>`<tr>${cols.map(c=>`<td>${esc(typeof row[c]==='object'?JSON.stringify(row[c]):row[c])}</td>`).join('')}</tr>`).join('')}</tbody></table></div><p>${list.length} record(s)</p>`};draw('');search.oninput=e=>draw(e.target.value);refresh.onclick=()=>records(label,table)}
async function accounting(period='month'){const n=new Date();let a,b,label;if(period==='today'){a=new Date(n.getFullYear(),n.getMonth(),n.getDate());b=new Date(a);b.setDate(b.getDate()+1);label='Today'}else if(period==='week'){a=new Date(n.getFullYear(),n.getMonth(),n.getDate()-((n.getDay()+6)%7));b=new Date(a);b.setDate(b.getDate()+7);label='This week'}else{a=new Date(n.getFullYear(),n.getMonth(),1);b=new Date(n.getFullYear(),n.getMonth()+1,1);label='This month'}const[s,e]=await Promise.all([sb.from('sales').select('total_usd,status').gte('occurred_at',a.toISOString()).lt('occurred_at',b.toISOString()),sb.from('expenses').select('amount_usd').gte('incurred_at',a.toISOString()).lt('incurred_at',b.toISOString())]);if(s.error)throw s.error;if(e.error)throw e.error;let rec=0,exc=0,rc=0,ec=0;for(const x of s.data||[]){if(['voided','refunded','cancelled'].includes(String(x.status).toLowerCase())){exc+=Number(x.total_usd||0);ec++}else{rec+=Number(x.total_usd||0);rc++}}const ex=(e.data||[]).reduce((z,x)=>z+Number(x.amount_usd||0),0);content.innerHTML=`<div class="head"><div><h2>Accounting and profit & loss</h2><p>${label}</p></div></div><div class="tools"><button class="btn soft" data-p="today">Today</button><button class="btn soft" data-p="week">This week</button><button class="btn soft" data-p="month">This month</button></div><div class="grid">${metric('Recognised sales','$'+money(rec),rc+' included')}${metric('Operating expenses','$'+money(ex),(e.data||[]).length+' entries')}${metric('Operating net','$'+money(rec-ex),rec-ex>=0?'Profitable':'Loss')}${metric('Excluded sales','$'+money(exc),ec+' excluded')}</div>`;document.querySelectorAll('[data-p]').forEach(x=>x.onclick=()=>accounting(x.dataset.p))}
function settings(){content.innerHTML=`<div class="head"><div><h2>Settings</h2><p>Current secure portal environment.</p></div></div><div class="panel"><p><b>Supabase project:</b> bujocrzkqqijdzmfozis</p><p><b>User:</b> ${esc(ctx.name)}</p><p><b>Roles:</b> ${esc(ctx.roles.join(', '))}</p><p><b>Organisation:</b> ${esc(ctx.org)}</p><p><b>Portal URL:</b> ${esc(location.href.split('#')[0])}</p></div>`}
async function boot(){const{data:{session}}=await sb.auth.getSession();if(!session){auth();return}try{ctx=await context();if(!ctx){auth();return}if(!ctx.active)throw new Error('This account is inactive.');if(!ctx.org){setup();return}if(!ctx.roles.some(r=>rolesAllowed.has(r)))throw new Error('Management access is restricted to owners, administrators, managers and auditors.');page='Overview';shell();await overview()}catch(x){auth(x.message||String(x))}}
sb.auth.onAuthStateChange(()=>setTimeout(boot,0));boot();
</script></body></html>
